<title>얼리버드 × 가동률 현황 (W13)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--card:#14161e;--border:#1e2130;--text:#e2e4ea;--text-dim:#8b8fa3;--accent:#6c8aff;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;padding:24px;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:1440px;margin:0 auto}
header{text-align:center;margin-bottom:32px;padding:32px 0 24px}
header h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#6c8aff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text-dim);font-size:13px;margin-top:8px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.kpi-card.blue::before{background:linear-gradient(90deg,#6c8aff,#818cf8)}
.kpi-card.green::before{background:linear-gradient(90deg,#34d399,#6ee7b7)}
.kpi-card.orange::before{background:linear-gradient(90deg,#fb923c,#fbbf24)}
.kpi-card.red::before{background:linear-gradient(90deg,#f87171,#fb7185)}
.kpi-label{font-size:12px;color:var(--text-dim);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;margin:8px 0 4px}
.kpi-sub{font-size:12px;color:var(--text-dim)}

.section{margin-bottom:32px}
.section-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-controls{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);align-items:center}
.table-controls label{font-size:12px;color:var(--text-dim);margin-right:4px}
.table-controls select,.table-controls input{background:#1a1c28;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#1a1c28;position:sticky;top:0;z-index:1}
th{padding:10px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th .sort-arrow{margin-left:4px;font-size:10px}
td{padding:9px 12px;border-bottom:1px solid #1a1c28;white-space:nowrap}
tr:hover td{background:#1a1c2a}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:rgba(248,113,113,0.15);color:var(--red)}
.badge-yellow{background:rgba(251,191,36,0.15);color:var(--yellow)}
.badge-green{background:rgba(52,211,153,0.15);color:var(--green)}
.bar-cell{width:100px;position:relative}
.bar-bg{height:6px;border-radius:3px;background:#1e2130;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}

.chart-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.chart-box{position:relative;height:480px}

.excl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px}
.excl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.excl-card h4{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.excl-list{list-style:none}
.excl-list li{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1c28;font-size:13px}
.excl-list li:last-child{border:none}
.excl-list .zone{font-weight:500}
.excl-list .detail{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}
.excl-summary{margin-top:12px;padding:10px 14px;background:#1a1c28;border-radius:8px;font-size:12px;color:var(--text-dim)}
.excl-summary strong{color:var(--text)}

footer{text-align:center;padding:32px 0 16px;color:var(--text-dim);font-size:11px;border-top:1px solid var(--border);margin-top:24px}
</style>
</head>

<div class="table-controls">

<label>검색:</label>
<input type="text" id="searchInput" placeholder="지역명...">
</div>

<table id="mainTable">

<tr>

<th data-col="status">제외 추천 <span class="sort-arrow"></span></th>
</tr>
</thead>
<tbody id="mainBody"></tbody>
</table>
</div>
</div>
</div>

<!-- Section 3: Region Chart -->
<div class="section">
<div class="section-title"><span class="dot"></span>지역별 유휴율 요약</div>
<div class="chart-container">

</div>
</div>

<!-- Section 4: Exclusion Recommendations -->

<div class="section-title"><span class="dot"></span>제외 추천 구간</div>
<div class="excl-grid" id="exclGrid"></div>
</div>

<footer>얼리버드 &times; 가동률 대시보드 &nbsp;|&nbsp; W13 반납기준 &nbsp;|&nbsp; 2026.03.30</footer>
</div>

<div class="kpi-card green">
    <div class="kpi-label">얼리버드 W13 실적</div>
    <div class="kpi-value">${totalEbCnt.toLocaleString()}건</div>
    <div class="kpi-sub">매출 ${totalEbRev.toFixed(0)}M | GPM ${weightedGpm.toFixed(1)}%</div>
</div>
<div class="kpi-card orange">
    <div class="kpi-label">분석 대상 구간</div>
    <div class="kpi-value">${joined.length}개</div>
    <div class="kpi-sub">지역 ${[...new Set(utilData.map(u=>u.region))].length}개 &times; 차종 ${[...new Set(utilData.map(u=>u.car_group))].length}개</div>
</div>
<div class="kpi-card red">
    <div class="kpi-label">유휴율 50% 미만 (제외 대상)</div>
    <div class="kpi-value">${excludeCount}개</div>
    <div class="kpi-sub">가동률 높아 얼리버드 불필요 구간</div>
</div>`;

// === POPULATE FILTERS ===
const carGroups = [...new Set(utilData.map(u=>u.car_group))].sort();
const cgSelect = document.getElementById('filterCarGroup');
carGroups.forEach(cg => { const o=document.createElement('option'); o.value=cg; o.textContent=cg; cgSelect.appendChild(o); });

// === TABLE RENDERING ===
let sortCol = 'idle_rate', sortAsc = true;

function getBarColor(idle) {
    if (idle < 50) return 'var(--red)';
    if (idle <= 60) return 'var(--yellow)';
    return 'var(--green)';
}

function renderTable() {
    const cgFilter = document.getElementById('filterCarGroup').value;
    const stFilter = document.getElementById('filterStatus').value;
    const search = document.getElementById('searchInput').value.trim().toLowerCase();

    let data = [...joined];
    if (cgFilter !== 'all') data = data.filter(r => r.car_group === cgFilter);
    if (stFilter !== 'all') data = data.filter(r => r.status === stFilter);
    if (search) data = data.filter(r => r.region.toLowerCase().includes(search));

    data.sort((a,b) => {
        let va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
    });

    const tbody = document.getElementById('mainBody');
    tbody.innerHTML = data.map(r => `<tr>
        <td>${r.region}</td>
        <td>${r.car_group}</td>
        <td class="num">${r.dp_cars.toLocaleString()}</td>
        <td class="num">${r.util_rate.toFixed(1)}%</td>
        <td class="num" style="color:${getBarColor(r.idle_rate)}">${r.idle_rate.toFixed(1)}%</td>
        <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${r.idle_rate}%;background:${getBarColor(r.idle_rate)}"></div></div></td>
        <td class="num">${r.idle_cars.toLocaleString()}</td>
        <td class="num">${r.eb_cnt > 0 ? r.eb_cnt.toLocaleString() : '-'}</td>
        <td class="num">${r.eb_rev > 0 ? r.eb_rev.toFixed(1) : '-'}</td>
        <td class="num">${r.eb_gpm > 0 ? r.eb_gpm.toFixed(1)+'%' : '-'}</td>
        <td><span class="badge ${r.statusClass}">${r.status === '제외 권장' ? '\u{1F534}' : r.status === '검토' ? '\u{1F7E1}' : '\u{1F7E2}'} ${r.status}</span></td>
    </tr>`).join('');

    // Update sort arrows
    document.querySelectorAll('#mainTable th').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (!arrow) return;
        const col = th.dataset.col;
        if (col === sortCol) arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
        else arrow.textContent = '';
    });
}

// Sort on header click
document.querySelectorAll('#mainTable th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (col === sortCol) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        renderTable();
    });
});

// Map data-col to object keys
const colMap = {region:'region',car_group:'car_group',dp_cars:'dp_cars',util_rate:'util_rate',idle_rate:'idle_rate',idle_cars:'idle_cars',eb_cnt:'eb_cnt',eb_rev:'eb_rev',eb_gpm:'eb_gpm',status:'status'};

document.getElementById('filterCarGroup').addEventListener('change', renderTable);
document.getElementById('filterStatus').addEventListener('change', renderTable);
document.getElementById('searchInput').addEventListener('input', renderTable);

renderTable();

// === REGION CHART ===
const regionAgg = {};
utilData.forEach(u => {
    if (!regionAgg[u.region]) regionAgg[u.region] = {dp:0, idleW:0, ebCnt:0, ebRev:0};
    regionAgg[u.region].dp += u.dp_cars;
    regionAgg[u.region].idleW += u.idle_rate * u.dp_cars;
});
ebData.forEach(e => {
    if (!regionAgg[e.region]) regionAgg[e.region] = {dp:0, idleW:0, ebCnt:0, ebRev:0};
    regionAgg[e.region].ebCnt += e.eb_cnt;
    regionAgg[e.region].ebRev += e.eb_rev;
});

const regionList = Object.entries(regionAgg).map(([r,v]) => ({
    region: r,
    idle_rate: v.dp > 0 ? v.idleW / v.dp : 0,
    dp_cars: v.dp,
    eb_cnt: v.ebCnt,
    eb_rev: v.ebRev
})).sort((a,b) => a.idle_rate - b.idle_rate);

const ctx = document.getElementById('regionChart').getContext('2d');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: regionList.map(r => r.region),
        datasets: [{
            label: '유휴율 (%)',
            data: regionList.map(r => r.idle_rate.toFixed(1)),
            backgroundColor: regionList.map(r => {
                if (r.idle_rate < 50) return 'rgba(248,113,113,0.7)';
                if (r.idle_rate <= 60) return 'rgba(251,191,36,0.7)';
                return 'rgba(52,211,153,0.7)';
            }),
            borderColor: regionList.map(r => {
                if (r.idle_rate < 50) return '#f87171';
                if (r.idle_rate <= 60) return '#fbbf24';
                return '#34d399';
            }),
            borderWidth: 1,
            borderRadius: 4,
            barPercentage: 0.7
        }]
    },
    options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: '#14161e',
                borderColor: '#1e2130',
                borderWidth: 1,
                titleFont: { family: 'Noto Sans KR' },
                bodyFont: { family: 'JetBrains Mono', size: 12 },
                callbacks: {
                    afterLabel: function(ctx) {
                        const r = regionList[ctx.dataIndex];
                        return `배포: ${r.dp_cars.toLocaleString()}대 | 얼리버드: ${r.eb_cnt}건 (${r.eb_rev.toFixed(1)}M)`;
                    }
                }
            }
        },
        scales: {
            x: {
                grid: { color: '#1e2130' },
                ticks: { color: '#8b8fa3', font: { family: 'JetBrains Mono', size: 11 }, callback: v => v+'%' },
                min: 0, max: 80
            },
            y: {
                grid: { display: false },
                ticks: { color: '#e2e4ea', font: { family: 'Noto Sans KR', size: 12 } }
            }
        }
    }
});

// === EXCLUSION RECOMMENDATIONS ===
const excludeRows = joined.filter(r => r.idle_rate < 50).sort((a,b) => a.idle_rate - b.idle_rate);
const reviewRows = joined.filter(r => r.idle_rate >= 50 && r.idle_rate <= 60).sort((a,b) => a.idle_rate - b.idle_rate);

const exclEbCnt = excludeRows.reduce((s,r) => s+r.eb_cnt, 0);
const exclEbRev = excludeRows.reduce((s,r) => s+r.eb_rev, 0);
const reviewEbCnt = reviewRows.reduce((s,r) => s+r.eb_cnt, 0);
const reviewEbRev = reviewRows.reduce((s,r) => s+r.eb_rev, 0);

document.getElementById('exclGrid').innerHTML = `
<div class="excl-card" style="border-left:3px solid var(--red)">
    <h4>\u{1F534} 제외 권장 (유휴율 &lt; 50%) &mdash; ${excludeRows.length}개 구간</h4>
    <ul class="excl-list">
        ${excludeRows.map(r => `<li>
            <span class="zone">${r.region} &middot; ${r.car_group}</span>
            <span class="detail">유휴 ${r.idle_rate.toFixed(1)}% | 배포 ${r.dp_cars.toLocaleString()}대 | EB ${r.eb_cnt}건 ${r.eb_rev.toFixed(1)}M</span>
        </li>`).join('')}
    </ul>
    <div class="excl-summary">제외 시 영향: 얼리버드 <strong>${exclEbCnt}건</strong> / <strong>${exclEbRev.toFixed(1)}M</strong> 감소 예상</div>
</div>
<div class="excl-card" style="border-left:3px solid var(--yellow)">
    <h4>\u{1F7E1} 검토 필요 (유휴율 50~60%) &mdash; ${reviewRows.length}개 구간</h4>
    <ul class="excl-list">
        ${reviewRows.map(r => `<li>
            <span class="zone">${r.region} &middot; ${r.car_group}</span>
            <span class="detail">유휴 ${r.idle_rate.toFixed(1)}% | 배포 ${r.dp_cars.toLocaleString()}대 | EB ${r.eb_cnt}건 ${r.eb_rev.toFixed(1)}M</span>
        </li>`).join('')}
    </ul>
    <div class="excl-summary">검토 구간 영향: 얼리버드 <strong>${reviewEbCnt}건</strong> / <strong>${reviewEbRev.toFixed(1)}M</strong></div>
</div>`;
</script>
</body>
</html>
